name: Atualizar Radar AMRS

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install feedparser
      - run: python fetch_news.py
      - run: |
          git config user.name "AMRS Radar Bot"
          git config user.email "bot@amrs.com.br"
          git add data/news.json
          git diff --staged --quiet || git commit -m "Atualização diária"
          git push
